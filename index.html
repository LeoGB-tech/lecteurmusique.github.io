<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Lecteur Musique</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        #audio-list { margin-top: 20px; }
        .track { background: white; padding: 10px; margin: 5px 0; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Ma Bibliothèque</h1>
    <input type="file" id="fileInput" accept="audio/mp3" multiple>
    <div id="audio-list"></div>
    <audio id="audioPlayer" controls style="width:100%; margin-top: 20px;"></audio>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
